# lefthook.yml — the single orchestrator. Every commit-time rule runs through here.
#
# Two triggers, by speed (commit is the real gate, and it runs WITHOUT Claude —
# which is why the rule files are committed in the repo, not a per-user cache):
#   • agent-edit — fast, file-local. Run on every Claude Edit/Write via
#     .claude/hooks/lefthook-on-write.sh → `lefthook run agent-edit --file <p>`.
#   • pre-commit — the full gate: the same rules over the staged set.
#
# The `engine` job IS the gate (rules/_engine.mjs, --phase commit). It runs the
# auto-discovered ast-grep pattern files AND every signposts.yaml rule (grouped by
# namespace) whose `when:` includes commit — the SAME rules the PreToolUse hook runs
# pre-emptively at edit time. It self-filters by each rule's `on:` glob, so no per-job
# glob is needed. (Only the git-discard safety guard stays a dedicated PreToolUse hook —
# it correlates against live git state, which the engine's per-file model doesn't cover.)
#
# Each `run:` puts the matched files into positional params (`set --`) and skips
# when there are none. Rule sources + how to prove them: rules/README.md.

output:
  - summary
  - failure

agent-edit:
  parallel: true
  jobs:
    - name: engine
      run: 'set -- {staged_files}; [ "$#" -eq 0 ] || node rules/_engine.mjs --phase commit "$@"'

pre-commit:
  parallel: true
  jobs:
    - name: engine
      run: 'set -- {staged_files}; [ "$#" -eq 0 ] || node rules/_engine.mjs --phase commit "$@"'
