id: date-default-no-nullish
description: Use `||`, not `??`, for optional date defaults — `??` lets an empty string / 0 / bad placeholder flow through as a bad date.
language: tsx
severity: error
message: |
  Use `||`, not `??`, for optional date defaults.

  Why this matters:
    `??` only falls through on null/undefined. An empty string, `0`, or an
    invalid placeholder date passes the `??` guard and flows downstream as a
    bad date. `||` also catches those falsy cases, which is what date defaults
    actually want here.

  Fix:
    const published = row.published_at || new Date();   // not ?? new Date()

  Read more: signposts.asim.dev/docs/rules/ast-grep

rule:
  any:
    - pattern: $X ?? new Date($$$)
    - pattern: $X ?? new Date
