# signposts.yml — the ONE file Signposts needs.
#
# Top-level keys: `project` (stack identity) and `config` (engine settings). EVERYTHING ELSE is a
# BUNDLE — the unit you adopt and share. A bundle carries a `title`, a `summary`, and a `signposts:`
# list. Each item in that list is a SIGNPOST — a `sign` (steers, never blocks) or a `rule` (blocks) —
# tagged with `type:`, so a sign and its related rule sit together in reading order.
#
# Every signpost has:
#   type          sign | rule
#   id            short unique name
#   description   a one-line, human "what is this" (for reading the file, not for the agent)
#   at            the LIFECYCLE MOMENT it fires — signs: session | touch | turn-end · rules: write | commit | delete | command | turn-end
#   on            (optional) the file glob it applies to
#   text          (signs) the guidance injected · message (rules) the reason shown on a block · use (rules) the script
#
# A bundle owns rules/<bundle>/** — the ownership convention install/uninstall move by.

project:
  name: signposts-core
  description: The signposts engine + the /signposts skill + the coach agent (reflect detector).

config:
  drift_tokens: 200000      # re-inject a sign after ~this many tokens of drift

# ── signposts — the DEFAULT bundle: the guards you want on any Signposts-guarded repo ──
signposts:
  title: Signposts defaults
  summary: The orientation and guards you want on any repo that uses Signposts. This is what a fresh install carries.
  signposts:
    - type: sign
      id: orientation
      description: What Signposts is and how it steers — shown at the start of every session.
      at: [session]
      text: |-
        This repo is guarded by Signposts. Rules block risky edits before they land (and again at commit); signs steer you by area as you touch files.
        Author or refine a guardrail with the /signposts skill — never loosen a rule just to get an edit through; that's the user's call.

    - type: sign
      id: rules-self-edit
      description: A nudge when you edit the guardrails themselves; it never blocks.
      at: [touch]
      on: ["signposts.yml", "signposts.yaml", "rules/**", ".claude/settings.json"]
      text: |-
        You are editing the guardrails themselves.
        If this edit weakens or removes a rule/permission because it just blocked you — stop and confirm with the user first.
        Authoring new signposts is always fine; loosening one to get an edit through is the user's call, not yours.

    - type: sign
      id: authoring-rules
      description: How to write a rule, shown when you're working in rules/.
      at: [touch]
      on: ["rules/**"]
      text: |-
        A rule names a script with `use:` (core/<name> or <bundle>/<name>) and carries its config inline.
        Check the cheaper shapes before writing an own-script: a code pattern is a rules/<bundle>/ast-grep/<name>.yml; an import boundary is a core/depcruise fence; a path/shape invariant is a core script + config.
        Ship a colocated <name>.test.yml (a valid + an invalid sample) — rules-have-tests blocks an untested rule.

    - type: rule
      id: rules-have-tests
      description: Every rule file ships a colocated <name>.test.yml the engine runs.
      at: [write, commit]
      on: ["rules/**/*.mjs", "rules/**/*.sh", "rules/**/*.yml"]
      ignore: ["**/*.test.yml"]
      use: core/sibling-exists
      sibling: "{dir}/{name}.test.yml"
      message: "Every rule needs a sibling <name>.test.yml (valid/invalid samples the engine runs). Add it, then `just test-rules`."

    - type: rule
      id: rules-tested-this-turn
      description: Holds the turn open if you changed a rule this turn but didn't run its tests.
      at: [turn-end]
      on: ["rules/**"]
      use: core/ran-since-edit
      must_run: "just test-rules"
      message: "You changed rules/ this turn but never ran `just test-rules` — run it before finishing."

    - type: sign
      id: ast-grep-grammars
      description: What ast-grep is (a structural code matcher) and how to add a language grammar.
      at: [touch]
      on: ["rules/**/ast-grep/**", "sgconfig.yml"]
      text: |-
        ast-grep matches code by its STRUCTURE (an abstract-syntax-tree pattern), not by regex — so it never false-matches a string or a comment. A code-shape rule is a rules/<bundle>/ast-grep/<name>.yml with a `pattern:`.
        It parses html · css · js · ts · tsx out of the box. Other languages need a grammar: some (sql, python, go, rust) are an `npx signposts languages add <lang>` away; astro/vue/svelte have none and are built from source, then `npx signposts languages register`.
        An unknown language is an honest error — never a silent fall-through to Tsx.

    - type: sign
      id: depcruise-fences
      description: What dependency-cruiser is (an import-graph checker) and how the fence dialect works.
      at: [touch]
      on: ["rules/**/*.cjs", "**/.dependency-cruiser.cjs"]
      text: |-
        dependency-cruiser is a tool that walks your import graph and flags edges that break an architecture rule (say, the pure core importing the effectful shell). A `.cjs` here is its native config file.
        Prefer the declarative `use: core/depcruise` dialect: name your `layers` (path globs / npm packages) and the `forbid` / `only` / `require` fences between them — Signposts compiles that to dependency-cruiser for you.
        The dialect closes the holes a hand-written config leaves open (fail-closed allowlists, transitive reach, node builtins, a type-only carve-out). Reach for a raw `.cjs` via `config:` only for the long tail.

    - type: rule
      id: no-delete-guardrails
      description: Stops a command from deleting the config or a rule file (opt out with a marker).
      at: [delete]
      use: core/protected-path
      deny: ["signposts.yml", "signposts.yaml", "rules/**"]
      message: "That command would delete a guardrail (signposts.yml / rules/**). If you truly mean it, append `# signposts-delete-ok`."

    - type: rule
      id: signposts-well-formed
      description: Checks signposts.yml parses and every signpost has an id, a use (rules), and a description.
      at: [write, commit]
      on: ["signposts.yml", "signposts.yaml"]
      use: core/signposts-lint
      require: [description]
      message: "The signposts config isn't well-formed — each signpost needs an id and a `description:` (and a rule needs `use:`). See the listed entries."

    - type: rule
      id: no-commit-engine-log
      description: Stops the Signposts event log (.signposts/) being checked in.
      at: [commit]
      use: core/protected-path
      deny: [".signposts/**"]
      message: "The engine event log (.signposts/) is per-session local telemetry — never commit it. It's gitignored; if you're force-adding it, stop and reconsider."

# ── tooling — the justfile is the one command source (installable, opt-in) ──
tooling:
  title: Tooling — the justfile is home
  summary: The justfile is the single command source; commands you run more than once become documented recipes.
  signposts:
    - type: sign
      id: tooling-first
      description: Where the repo's commands live, and when to add a recipe.
      at: [session]
      text: |-
        The justfile is this repo's canonical toolbox — run `just` to list every recipe (the commands you can use here). Look there first.
        A one-off command or chain is fine to run directly. But any command you'll run more than once — or a multi-step sequence worth a name — becomes a justfile recipe (each with a [doc("…")]); package.json `scripts` stays empty.

    - type: rule
      id: no-package-scripts
      description: Keeps package.json scripts empty — the justfile is the one command source.
      at: [write, commit]
      on: "package.json"
      use: core/json-invariant
      assert: { path: scripts, keysPrefixedWith: "//" }
      message: "package.json `scripts` must stay empty — the justfile is the single command source. Only //-prefixed comment keys are allowed; move commands into a justfile recipe."

    - type: rule
      id: justfile-docs
      description: Every justfile recipe carries an explicit doc string for the just --list help screen.
      at: [write, commit]
      on: "justfile"
      use: tooling/justfile-docs
      exempt: []
      message: "Every justfile recipe needs an explicit [doc(\"…\")] — `just --list` is the command catalogue's help screen."

# ── git-hygiene — how commits are made here (installable, opt-in) ──
git-hygiene:
  title: Git hygiene
  summary: No AI attribution in commits, PRs or issues, and nothing silently discards uncommitted work.
  signposts:
    - type: sign
      id: commit-hygiene
      description: The rules for how commits, PRs and issues are written here.
      at: [session]
      text: |-
        Commits, PRs and issues carry NO Claude/Anthropic attribution — no Co-Authored-By line, no "Generated with Claude", no mention. Author them as your own.
        A `git checkout` / `git restore` that would silently wipe uncommitted work is blocked — stash first, or append `# discard-ok` if you truly mean it.

    - type: rule
      id: no-ai-attribution-in-commits
      description: Blocks Claude/Anthropic attribution in a commit, PR or issue before it is made.
      at: [command]
      use: core/command-guard
      ban:
        - 'git commit[\s\S]*[Cc]o-[Aa]uthored-[Bb]y:[\s\S]*([Cc]laude|[Aa]nthropic)'
        - 'git commit[\s\S]*[Gg]enerated with[\s\S]*[Cc]laude'
        - 'git commit[\s\S]*(claude\.com/claude-code|🤖 Generated)'
        - 'gh (pr|issue)[\s\S]*[Cc]o-[Aa]uthored-[Bb]y:[\s\S]*([Cc]laude|[Aa]nthropic)'
        - 'gh (pr|issue)[\s\S]*(claude\.com/claude-code|🤖 Generated)'
      message: |-
        Commit / PR / issue body contains Claude or Anthropic attribution.
        Remove it (the Co-Authored-By line, the "Generated with Claude" line, any Claude/Anthropic mention) and retry.

    - type: rule
      id: no-git-discard
      description: Blocks a git checkout/restore that would wipe uncommitted work; opt out with a trailing # discard-ok.
      at: [command]
      use: git-hygiene/no-git-discard
      message: "This git command would discard uncommitted edits with no undo — stash first, or append `# discard-ok`."

# ── local — ONLY for developing Signposts itself (this codebase); never installed elsewhere ──
local:
  title: Developing Signposts
  summary: Orientation and guards for working ON the Signposts codebase itself.
  signposts:
    - type: sign
      id: dev-orientation
      description: How the Signposts codebase is laid out and how we work in it.
      at: [session]
      text: |-
        You are in the Signposts codebase itself — the engine that keeps AI coding agents on the rails, plus its /signposts skill and coach agent.
        Layout: src/ is the engine — src/engine.mjs (the rule evaluator), src/schema.mjs (the config normaliser), src/hooks/ (the PreToolUse / PostToolUse / SessionStart / Stop rails), src/core/ (the built-in rule scripts you reach via `use: core/<name>`), src/cli/ (the npx entry + lifecycle), src/skill/ (facts + pack-diff).
        rules/ holds this repo's own guard scripts, one folder per bundle. site/ is the standalone Astro website (the canonical docs). test/ is the e2e + hook-integration suites.
        Shape: keep decision logic pure and testable (the core scripts' evaluate, the normaliser) and push IO to the edges (the hooks) — the rails fail safe and must never throw or block an edit.
        Config is signposts.yml, bundle-first: each top-level key is a bundle (a title, a summary, and a signposts list of typed signs + rules).

    - type: sign
      id: site
      description: How to build and style the website.
      at: [touch]
      on: ["site/**"]
      text: |-
        The website is the canonical docs (signposts.asim.dev), a standalone Astro project in site/ — drive it via `just site-dev` / `just site-build`, never root scripts.
        The design specs (palette, type, motion) live in the task's design.md. British English; no animation libraries (vanilla canvas + CSS + IntersectionObserver), and every animation ships a `prefers-reduced-motion` still.

    - type: sign
      id: work-journal
      description: .work/ is the gitignored working-docs journal — don't commit it.
      at: [touch]
      on: [".work/**"]
      text: |-
        `.work/` is the gitignored working-docs journal — never commit it into the code repo.
        Status is the `status` field in each task's `.props.yaml`; the folder at tasks/<type>/<area>/<name>/ never moves.

    - type: sign
      id: engine-failsafe
      description: Why the hooks and event log must never throw or block an edit.
      at: [touch]
      on: ["src/log.mjs", "src/hooks/**"]
      text: |-
        Side-channel, not a gate: the event log and sign injector must NEVER throw and never block an edit, commit, scan, or sign.
        New code here swallows its own errors (logEvent returns false, never raises) — a broken or unwritable log can't be allowed to break the gate.

    - type: sign
      id: yaml-writes-keep-comments
      description: Why writes to signposts.yml must go through editYaml, to preserve the user's comments.
      at: [touch]
      on: ["src/cli/install.mjs", "src/cli/refresh.mjs", "src/cli/uninstall.mjs"]
      text: |-
        Mutating the config file goes through parseDocument (editYaml), never parse then stringify — the round-trip strips the user's comments.
        install/refresh preserve them by contract; keep it that way. The schema normaliser is READ-time only and never touches the write path.
