# lefthook.yml — the commit gate, scaffolded by `npx signposts`.
#
# The gate runs the engine FROM the installed package (node_modules/signposts), so this
# repo vendors no engine source. It runs at `git commit` WITHOUT Claude — the same rules
# the PreToolUse hook runs pre-emptively at edit time. Each rule self-filters by its `on:`
# glob. Run `npx signposts refresh` to update installed packs; `npm update signposts` for
# the core.

output:
  - summary
  - failure

agent-edit:
  parallel: true
  jobs:
    - name: signposts
      run: 'set -- {staged_files}; [ "$#" -eq 0 ] || node node_modules/signposts/src/engine.mjs --phase commit "$@"'

pre-commit:
  parallel: true
  jobs:
    - name: signposts
      run: 'set -- {staged_files}; [ "$#" -eq 0 ] || node node_modules/signposts/src/engine.mjs --phase commit "$@"'
