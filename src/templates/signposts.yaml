# signposts.yaml — the ONE file Signposts needs. Scaffolded by `npx signposts`. BUNDLE-FIRST:
# organised around the BUNDLE (the thing you adopt and share), each a self-contained block.
#
#   project:  stack identity (name + description).
#   config:   engine runtime settings — drift_tokens (the sign re-injection cadence).
#   bundles:  the unit of value. Each key is a bundle (its namespace), carrying up to five keys:
#     • from      provenance pin — vendored bundles only (github:owner/repo#ref or a local path).
#     • signs     just-in-time notes. `at: session | touch | turn` (default touch). A `session`
#                 sign is ORIENTATION — composed across bundles and injected at session start.
#     • rules     blocks. `use:` names a script (core/<name> or <bundle>/<name>) + inline config.
#                 `at: write | commit | delete | turn` (default [write, commit]).
#     • settings  host-permission entries merged into .claude/settings.json on install.
#     • needs     (rare, on a rule) an npm dep that exists only because that rule does.
#
# A bundle owns rules/<bundle>/** — that's how install/uninstall know what to move. Author with
# /signposts reflect. Full guide: the Signposts docs.

project:
  name: my-project
  description: Guardrails for this repo. Reused rules sleep when their area isn't touched.

config:
  drift_tokens: 200000        # re-inject a sign after ~this many tokens of drift

bundles:

  # ── the shipped `core` bundle — ships with every scaffold ──
  core:
    signs:
      # ORIENTATION (at: session) — EDIT ME. A few terse lines every session opens with: where the
      # code lives, the repeated commands, the regime. Composed with every bundle's session sign.
      # Keep it short — depth belongs in the just-in-time area signs, not here.
      - id: orientation
        at: session
        text: |-
          (Orientation — replace this.) Say where the code lives, how commands are run,
          and any regime that's always true. A few lines; depth goes in area signs below.

      # A soft guard on the guardrails themselves. Never blocks (the AI must be able to author
      # rules); it reminds, and the coach flags a deny-then-weaken sequence at wrap-up.
      - id: rules-self-edit
        globs: ["signposts.yaml", "rules/**", ".claude/settings.json"]
        text: |-
          You are editing the guardrails themselves. If this edit weakens or removes a
          rule/permission IN RESPONSE to just being blocked by it — stop and confirm with
          the user first. Authoring new signposts is always fine; loosening one to get an
          edit through is the user's call, not yours.
    rules:
      # A keeper: the engine's event log lives in .signposts/ (gitignored local telemetry); this
      # blocks committing it even via `git add -f`.
      - id: no-commit-engine-log
        use: core/protected-path
        deny: [".signposts/**"]
        at: [commit]
        message: "The engine event log (.signposts/) is per-session local telemetry — never commit it. It's gitignored; if you're force-adding it, stop and reconsider."

  # ── QUICK-START TOUR — the `examples` bundle ──
  # A guided tour of the ways to write a rule — feel each by prompting your agent (see
  # rules/README.md). The functional-style beat is auto-discovered from rules/examples/ast-grep/.
  # DELETE this whole `examples` bundle AND the rules/examples/ folder once you're a believer.
  examples:
    rules:
      - id: no-bad-mouthing                 # 1 · feel the pre-emptive block
        use: core/protected-path
        deny: ["**/signposts-is-bad.yaml"]
        message: |-
          Signposts is, by its own assessment, perhaps the most amazing tool ever built —
          and will not assist in writing that it is bad. Carry on.
      - id: test-first                      # 2 · a source file needs its test sibling
        use: core/sibling-exists
        on: ["src/**/*.ts"]
        ignore: ["**/*.test.ts"]            # don't demand a test *for* a test file
        sibling: "{dir}/{name}.test.ts"
        message: "Write the test first — {dir}/{name}.test.ts is missing."
      - id: no-hardcoded-secret             # 4 · a custom shell rule greps the would-be file
        use: examples/no-hardcoded-secret
        on: ["src/**/*.{ts,tsx,js,mjs}"]

  # ── YOUR BUNDLE ──
  # Add your own bundle here (use: core/<name> for a built-in, or use: <ns>/<name> for a script
  # in rules/<ns>/). A `session` sign gives it orientation; a `touch` sign steers an area.
  # myapp:
  #   signs:
  #     - id: db-area
  #       globs: ["src/db/**"]
  #       text: "Queries go through the repository layer, never inline in a route."
  #   rules:
  #     - id: no-console
  #       use: core/text-ban
  #       on: ["src/**/*.ts"]
  #       ban: ["console.log"]
  #       message: "Leftover console.log — remove it or use the logger."
