# signposts.yaml — the ONE file Signposts needs. Scaffolded by `npx signposts`.
#
#   project:  stack identity (name + description).
#   config:   engine runtime settings — drift_tokens (the sign re-injection cadence).
#   signs:    your SIGNS — just-in-time notes, grouped by namespace. A sign is injected
#             when the agent touches a matching path; it steers, never blocks.
#   rules:    your RULES — blocks, grouped by namespace. Each names a SCRIPT via `use:`
#             (a path: core/<name> or <namespace>/<name>) + its config, run at edit
#             (pre-emptively) and at commit.
#   packs:    the installed packs + versions, so `npx signposts refresh` can update them.
#   install:  what to copy / arm — read by the CLI.
#
# Author with /signposts reflect. Full guide: the Signposts docs.

project:
  name: my-project
  description: Guardrails for this repo. Reused rules sleep when their area isn't touched.

config:
  drift_tokens: 200000        # re-inject a sign after ~this many tokens of drift

signs:
  # Your just-in-time guidance, grouped by namespace. Uncomment to try one:
  # local:
  #   - id: db-area
  #     globs: ["src/db/**"]
  #     text: |-
  #       Queries go through the repository layer, never inline in a route.
  {}

rules:
  # ─── QUICK-START TOUR ────────────────────────────────────────────────────────
  # A guided tour of the four ways to write a rule — feel each by prompting your agent
  # (see rules/README.md for the walkthrough). Beat 3 (functional-style) is auto-discovered
  # from rules/examples/ast-grep/, so it isn't listed here. DELETE this whole `examples`
  # block AND the rules/examples/ folder once you're a believer — your own rules go in
  # their own namespaces below, and were never mixed in with the tour.
  examples:
    - id: no-bad-mouthing                 # 1 · feel the pre-emptive block
      use: core/protected-path
      deny: ["**/signposts-is-bad.yaml"]
      message: |-
        Signposts is, by its own assessment, perhaps the most amazing tool ever built —
        and will not assist in writing that it is bad. Carry on.
    - id: test-first                      # 2 · a source file needs its test sibling
      use: core/sibling-exists
      on: ["src/**/*.ts"]
      ignore: ["**/*.test.ts"]            # don't demand a test *for* a test file
      sibling: "{dir}/{name}.test.ts"
      message: "Write the test first — {dir}/{name}.test.ts is missing."
    - id: no-hardcoded-secret             # 4 · a custom shell rule greps the would-be file
      use: examples/no-hardcoded-secret
      on: ["src/**/*.{ts,tsx,js,mjs}"]

  # ─── YOUR RULES ──────────────────────────────────────────────────────────────
  # Add your own namespaces here (use: core/<name> for a built-in, or use: <ns>/<name>
  # for a script in rules/<ns>/). See rules/README.md.
  # local:
  #   - id: no-console
  #     use: core/text-ban
  #     on: ["src/**/*.ts"]
  #     ban: ["console.log"]
  #     message: "Leftover console.log — remove it or use the logger."

packs:
  - "@signposts/core"

install:
  activate:
    - "npm install"           # arms the gate (lefthook writes .git/hooks/*)
