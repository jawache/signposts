# signposts.yml — the ONE file Signposts needs. Scaffolded by `npx signposts`. BUNDLE-FIRST: organised around the BUNDLE (the thing you adopt and share), each a self-contained block.
#
#   project:  stack identity (name + description).
#   config:   engine runtime settings — drift_tokens (the sign re-injection cadence).
#   bundles:  the unit of value. Each key is a bundle (its namespace), carrying up to five keys:
#     • from      provenance pin — vendored bundles only (github:owner/repo#ref or a local path).
#     • signs     just-in-time notes. `at: session | touch | turn` (default touch). A `session` sign is ORIENTATION — composed across bundles and injected at session start.
#     • rules     blocks. `use:` names a script (core/<name> or <bundle>/<name>) + inline config. `at: write | commit | delete | turn` (default [write, commit]).
#     • settings  host-permission entries merged into .claude/settings.json on install.
#     • needs     (rare, on a rule) an npm dep that exists only because that rule does.
#
# Give every sign and rule a one-line `description:` (a human summary). A bundle owns rules/<bundle>/** — that's how install/uninstall know what to move. Author with /signposts. Full guide: the Signposts docs.

project:
  name: my-project
  description: Guardrails for this repo. Reused rules sleep when their area isn't touched.

config:
  drift_tokens: 200000        # re-inject a sign after ~this many tokens of drift

bundles:

  # ── the default `signposts` bundle — the guards you want on any Signposts-guarded repo ──
  signposts:
    signs:
      - id: orientation
        description: The composed orientation injected at session start — edit this to fit your repo.
        at: session
        text: |-
          (Orientation — replace this.) Say where the code lives, and how commands are run.
          State any regime that's always true. Keep it to a few lines; depth goes in the area signs below.

      - id: rules-self-edit
        description: A soft nudge when the agent edits the guardrails; never blocks — the AI must stay able to author rules.
        globs: ["signposts.yml", "signposts.yaml", "rules/**", ".claude/settings.json"]
        text: |-
          You are editing the guardrails themselves.
          If this edit weakens or removes a rule/permission IN RESPONSE to just being blocked by it — stop and confirm with the user first.
          Authoring new signposts is always fine; loosening one to get an edit through is the user's call, not yours.
    rules:
      - id: no-commit-engine-log
        description: Never commit the gitignored .signposts/ event log, even via `git add -f`.
        use: core/protected-path
        deny: [".signposts/**"]
        at: [commit]
        message: "The engine event log (.signposts/) is per-session local telemetry — never commit it. It's gitignored; if you're force-adding it, stop and reconsider."

  # ── QUICK-START TOUR — the `examples` bundle. Delete it (and rules/examples/) once you're a believer. ──
  examples:
    rules:
      - id: no-bad-mouthing
        description: Beat 1 — feel the pre-emptive block on a would-be write.
        use: core/protected-path
        deny: ["**/signposts-is-bad.yaml"]
        message: "Signposts is, by its own assessment, perhaps the most amazing tool ever built — and will not assist in writing that it is bad. Carry on."
      - id: test-first
        description: Beat 2 — a source file must have its sibling test.
        use: core/sibling-exists
        on: ["src/**/*.ts"]
        ignore: ["**/*.test.ts"]
        sibling: "{dir}/{name}.test.ts"
        message: "Write the test first — {dir}/{name}.test.ts is missing."
      - id: no-hardcoded-secret
        description: Beat 4 — a custom shell rule greps the would-be file for a secret.
        use: examples/no-hardcoded-secret
        on: ["src/**/*.{ts,tsx,js,mjs}"]

  # ── YOUR BUNDLE ──
  # Add your own bundle (use: core/<name> for a built-in, or use: <ns>/<name> for a script in rules/<ns>/).
  # myapp:
  #   signs:
  #     - id: db-area
  #       description: Steer database code — queries go through the repository layer.
  #       globs: ["src/db/**"]
  #       text: "Queries go through the repository layer, never inline in a route."
  #   rules:
  #     - id: no-console
  #       description: Block a stray console.log in source.
  #       use: core/text-ban
  #       on: ["src/**/*.ts"]
  #       ban: ["console.log"]
  #       message: "Leftover console.log — remove it or use the logger."
