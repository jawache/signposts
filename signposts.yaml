# signposts.yaml — the ONE config a bundle carries. Five sections, each with a single
# consumer, so a rule never hard-codes its config and the CLI knows how to install:
#
#   project:   bundle identity (read by `npx signposts` for listing / propagate).
#   config:    engine runtime config (read by the signposts.mjs advisory hook).
#   advisory:  the proactive signs — a note injected the moment you touch a matching
#              path or run a matching command (read by signposts.mjs).
#   rules:     per-rule parameters — a parameterised check reads its slice via
#              rules/_config.mjs `ruleConfig('<name>')`. ast-grep rules don't appear
#              here: their pattern IS their config.
#   install:   files → destinations, devDeps, settings hooks, activation commands —
#              read by `npx signposts` to scaffold + ACTIVATE this bundle (Phase 6).
#
# Authored via /signposts. Schema reference: rules/README.md › "signposts.yaml schema".

project:
  bundle: core
  description: The signposts engine + work/signposts/review skills + the five review agents.

config:
  drift_tokens: 200000      # re-inject a sign after ~this many tokens of drift

advisory:
  - id: skills
    globs: [".claude/skills/**"]
    text: |-
      Author skills from their `templates/`; keep the plain-English bar. The skill
      carries *how* (process); the template carries *what* (structure) — don't
      reinvent the structure. Be multimodal: diagrams / tables over walls of prose.

  - id: agents
    globs: [".claude/agents/**"]
    text: |-
      Review sub-agents are read-only and RETURN findings to the main thread — they
      write NO files. Recommendations-or-silence: surface only what should change.

  - id: rules
    globs: ["rules/**"]
    text: |-
      Every rule ships a `--test` (a legal + an illegal sample), names the decision
      in its error message, and is wired into BOTH lefthook groups (agent-edit +
      pre-commit) AND the `just test-rules` recipe. Read rules/README.md for the how.

  - id: work-journal
    globs: [".work/**"]
    text: |-
      `.work/` is the gitignored working-docs journal — never commit it into the code
      repo. Status is the `status` field in each task's `.props.yaml`; the folder at
      tasks/<type>/<area>/<name>/ never moves.

rules:
  justfile-docs:
    exempt: []              # recipe names that don't require a [doc("…")] (throwaway helpers)

install:
  # Files this bundle drops into a target repo. `merge: true` means "weave into the
  # existing file" (settings.json keys, justfile recipes), never clobber.
  files:
    - { from: ".claude/hooks/",   to: ".claude/hooks/" }
    - { from: ".claude/agents/",  to: ".claude/agents/" }
    - { from: ".claude/skills/",  to: ".claude/skills/" }
    - { from: "rules/",           to: "rules/" }
    - { from: "lefthook.yml",     to: "lefthook.yml" }
    - { from: "sgconfig.yml",     to: "sgconfig.yml" }
    - { from: "justfile",         to: "justfile",       merge: true }
    - { from: "signposts.yaml",   to: "signposts.yaml", merge: true }
    - { from: ".claude/settings.json", to: ".claude/settings.json", merge: true }
  devDependencies:
    "@ast-grep/cli": "^0.42.3"
    "lefthook": "^2.1.8"
    "yaml": "^2.8.3"
  # Run, in order, after copying — this is what ARMS the gate (copy alone enforces nothing).
  activate:
    - "npm install"         # lefthook's postinstall writes .git/hooks/pre-commit
