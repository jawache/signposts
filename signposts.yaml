# signposts.yaml — the ONE file Signposts needs. A handful of sections, each with a
# single consumer, so nothing is wired in two places:
#
#   project:   stack identity — name + description (read by the CLI).
#   config:    engine runtime settings — drift_tokens (read by the sign injector).
#   signs:     your SIGNS — just-in-time notes, GROUPED BY NAMESPACE. A sign is
#              injected the moment the agent touches a matching path; it steers,
#              never blocks (read by the signposts.mjs hook).
#   rules:     your RULES — blocks, GROUPED BY NAMESPACE. Each names a SCRIPT via
#              `use:` (always a path: core/<name> or <namespace>/<name>) and carries
#              that script's config inline, handed over verbatim. The engine
#              (rules/_engine.mjs) runs them at edit (pre-emptively) and at commit.
#              ast-grep patterns are FILES (rules/ast-grep/*.yml) and don't appear here.
#   settings:  (optional) host-permission entries a pack carries, per namespace — merged
#              into .claude/settings.json on install (the host enforces reads + MCP tool
#              calls the engine never sees). Shape: <ns>: { permissions: { deny, allow } }.
#   packs:     the installed packs, so `refresh` / `uninstall --pack` can track them. A
#              plain string is legacy; install now writes an OBJECT entry ({ source,
#              namespaces, settings, installed }) so uninstall knows what it owns.
#   install:   files → destinations, devDeps, activation — read by `npx signposts`.
#
# A namespace is what install / propagate move as ONE unit — its signs AND rules.
# Authored via /signposts. Reference: docs/ (canonical) and rules/README.md.

project:
  name: signposts-core
  description: The signposts engine + the /signposts skill + the coach agent (reflect detector).

config:
  drift_tokens: 200000      # re-inject a sign after ~this many tokens of drift

signs:
  # The core sign — ships to every install. A SOFT guard on the guardrails themselves:
  # Signposts must stay editable by the AI (reflect authors rules — that's the product),
  # so this never blocks. It just injects a reminder the moment the agent touches a rule
  # file, and the coach flags a deny-then-weaken sequence at wrap-up (see coach.md).
  core:
    - id: rules-self-edit
      globs: ["signposts.yaml", "rules/**", ".claude/settings.json"]
      text: |-
        You are editing the guardrails themselves. If this edit weakens or removes a
        rule/permission IN RESPONSE to just being blocked by it — stop and confirm with
        the user first. Authoring new signposts is always fine; loosening one to get an
        edit through is the user's call, not yours.

  # This repo's own just-in-time guidance — the `local` namespace (guidance for
  # working ON signposts, not something we ship in the core pack).
  local:
    - id: skills
      globs: [".claude/skills/**"]
      text: |-
        Author skills from their `templates/`; keep the plain-English bar. The skill
        carries *how* (process); the template carries *what* (structure) — don't
        reinvent the structure. Be multimodal: diagrams / tables over walls of prose.

    - id: agents
      globs: [".claude/agents/**"]
      text: |-
        Review sub-agents are read-only and RETURN findings to the main thread — they
        write NO files. Recommendations-or-silence: surface only what should change.

    - id: rules
      globs: ["rules/**"]
      text: |-
        Every rule NAMES A SCRIPT with `use:` (a path: core/<name> or <ns>/<name>) and
        gets its config verbatim. Ship a `--test` (a legal + an illegal sample); name the
        decision in the message. Core scripts live in rules/core/; read rules/README.md.

    - id: work-journal
      globs: [".work/**"]
      text: |-
        `.work/` is the gitignored working-docs journal — never commit it into the code
        repo. Status is the `status` field in each task's `.props.yaml`; the folder at
        tasks/<type>/<area>/<name>/ never moves.

    - id: engine-failsafe
      globs: ["src/log.mjs", "src/hooks/**"]
      text: |-
        Side-channel, not a gate: the event log and sign injector must NEVER throw and never
        block an edit, commit, scan, or sign. New code here swallows its own errors (logEvent
        returns false, never raises) — a broken or unwritable log can't be allowed to break
        the gate.

    - id: yaml-writes-keep-comments
      globs: ["src/cli/**", "src/skill/**"]
      text: |-
        Mutating signposts.yaml goes through parseDocument (editYaml), never parse → stringify —
        the round-trip strips the user's comments. install/refresh preserve them by contract
        (that's why install.mjs moved off `parse as parseYaml`); keep it that way.

rules:
  # The shipped `core` pack — what a fresh `npx signposts` install carries.
  core:
    # The cheeky day-one demo, so a fresh install FEELS the pre-emptive block: try to
    # create a file named signposts-is-bad.yaml and it's denied before it lands.
    - id: signposts-self-regard
      use: core/protected-path
      deny: ["**/signposts-is-bad.yaml"]
      message: |-
        Signposts is, by its own assessment, perhaps the most amazing tool ever
        built — and will not assist in writing that it is bad. Delete this rule
        from signposts.yaml once you're a believer, and carry on.

    # The engine's event log lives in .signposts/ — per-session local telemetry, gitignored.
    # This is the enforcement backstop: even a `git add -f` can't sneak it into a commit.
    - id: no-commit-engine-log
      use: core/protected-path
      deny: [".signposts/**"]
      when: [commit]
      message: "The engine event log (.signposts/) is per-session local telemetry — never commit it. It's gitignored; if you're force-adding it, stop and reconsider."

  # This repo's own rules — the `local` namespace. They're built on core SCRIPTS
  # (core/json-invariant, core/protected-path) plus two own-scripts under rules/local/.
  local:
    # package.json `scripts` stays empty (only //-prefixed comment keys) — the
    # justfile is the one command source.
    - id: no-package-scripts
      use: core/json-invariant
      on: "package.json"
      assert: { path: scripts, keysPrefixedWith: "//" }
      message: "package.json `scripts` must stay empty — the justfile is the single command source. Only //-prefixed comment keys are allowed; move commands into a justfile recipe."

    # every justfile recipe carries a [doc("…")] — a JS own-script (rules/local/justfile-docs.mjs).
    - id: justfile-docs
      use: local/justfile-docs
      on: "justfile"
      exempt: []               # recipe names that don't require a [doc("…")] (throwaway helpers)
      message: "Every justfile recipe needs an explicit [doc(\"…\")] — `just --list` is the command catalogue's help screen."

    # generated / vendored files — a content-free edit/commit block. `when: [edit, commit]`
    # is the default (omitted): ONE rule, BOTH triggers.
    - id: no-edit-generated
      use: core/protected-path
      deny: ["**/*.generated.ts", "vendor/**"]
      message: "Generated / vendored file — don't edit by hand. Change the source it derives from, then regenerate."

  # An installable pack you can pull into your own projects (`/signposts install` from
  # this repo). A COMMAND rule: it blocks the Bash command before it runs, via the
  # command-guard hook — no copied .sh, just data.
  git-hygiene:
    # No Claude/Anthropic attribution in commits / PRs / issues (replaces the old
    # strip-claude-attribution.sh — same intent, now a rule).
    - id: no-ai-attribution-in-commits
      use: core/command-guard
      ban:
        - 'git commit[\s\S]*[Cc]o-[Aa]uthored-[Bb]y:[\s\S]*([Cc]laude|[Aa]nthropic)'
        - 'git commit[\s\S]*[Gg]enerated with[\s\S]*[Cc]laude'
        - 'git commit[\s\S]*(claude\.com/claude-code|🤖 Generated)'
        - 'gh (pr|issue)[\s\S]*[Cc]o-[Aa]uthored-[Bb]y:[\s\S]*([Cc]laude|[Aa]nthropic)'
        - 'gh (pr|issue)[\s\S]*(claude\.com/claude-code|🤖 Generated)'
      message: |-
        Commit / PR / issue body contains Claude or Anthropic attribution. Remove it
        (the Co-Authored-By line, the "Generated with Claude" line, any Claude/Anthropic
        mention) and retry.

    # Block a `git checkout -- <paths>` / `git restore <paths>` that would silently wipe
    # UNCOMMITTED work. An own-script (rules/git-hygiene/no-git-discard.mjs) because it
    # inspects live git state, not just a regex — but it fires through the SAME command
    # hook, as a rule (was the bespoke check-git-discard.mjs). Append `# discard-ok` to opt out.
    - id: no-git-discard
      use: git-hygiene/no-git-discard
      message: "This git command would discard uncommitted edits with no undo — stash first, or append `# discard-ok`."

packs:
  - "@signposts/core"          # this repo IS the core pack

install:
  # Files this bundle drops into a target repo. `merge: true` means "weave into the
  # existing file" (settings.json keys, justfile recipes), never clobber.
  files:
    - { from: ".claude/hooks/",   to: ".claude/hooks/" }
    - { from: ".claude/agents/",  to: ".claude/agents/" }
    - { from: ".claude/skills/",  to: ".claude/skills/" }
    - { from: "rules/",           to: "rules/" }
    - { from: "lefthook.yml",     to: "lefthook.yml" }
    - { from: "sgconfig.yml",     to: "sgconfig.yml" }
    - { from: "justfile",         to: "justfile",       merge: true }
    - { from: "signposts.yaml",   to: "signposts.yaml", merge: true }
    - { from: ".claude/settings.json", to: ".claude/settings.json", merge: true }
  devDependencies:
    "@ast-grep/cli": "^0.42.3"
    "@ast-grep/napi": "^0.42.3"
    "lefthook": "^2.1.8"
    "yaml": "^2.8.3"
  # Run, in order, after copying — this is what ARMS the gate (copy alone enforces nothing).
  activate:
    - "npm install"         # lefthook's postinstall writes .git/hooks/pre-commit
